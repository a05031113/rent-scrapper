name: 591 Room Monitor (頂溪站)

on:
  schedule:
    # 每小時執行一次（台灣時間 8:00~23:00，即 UTC 0:00~15:00）
    # 錯開 30 分鐘避免與整層住家爬蟲同時跑
    - cron: "30 0-15 * * *"
  workflow_dispatch: # 手動觸發

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run room scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper_room.py

      - name: Commit state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json pending_listings_room.json
          git diff --cached --quiet || git commit -m "chore: update seen_ids [skip ci]"
          git pull --rebase
          git push
